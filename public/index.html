<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Lista de Tareas Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; min-height: 100vh; padding: 30px; color: white; }
    h1 { text-align: center; font-size: 2rem; margin-bottom: 10px; color: #38bdf8; }

    /* Estadísticas */
    .stats { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
    .stat { background: #1e293b; padding: 12px 20px; border-radius: 10px; text-align: center; min-width: 120px; }
    .stat .numero { font-size: 1.8rem; font-weight: bold; }
    .stat .label { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }
    .stat.total .numero { color: #38bdf8; }
    .stat.pendientes .numero { color: #f59e0b; }
    .stat.completadas .numero { color: #22c55e; }
    .stat.vencidas .numero { color: #ef4444; }

    /* Formulario */
    .form-card { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 700px; margin: 0 auto 25px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    input, select { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; font-size: 14px; }
    input[type="text"] { grid-column: 1 / -1; }
    input[type="date"] { color: #94a3b8; }
    .btn-agregar { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    .btn-agregar:hover { background: #0ea5e9; }

    /* Filtros */
    .filtros { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filtro { padding: 7px 16px; border-radius: 20px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 13px; }
    .filtro.activo { background: #38bdf8; color: #0f172a; border-color: #38bdf8; font-weight: bold; }

    /* Tareas */
    .lista { max-width: 700px; margin: 0 auto; }
    .tarea { background: #1e293b; padding: 15px 18px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border-left: 4px solid #334155; transition: 0.2s; }
    .tarea.alta { border-left-color: #ef4444; }
    .tarea.media { border-left-color: #f59e0b; }
    .tarea.baja { border-left-color: #22c55e; }
    .tarea.completada { opacity: 0.5; }
    .tarea.completada .titulo { text-decoration: line-through; color: #64748b; }
    .tarea.vencida { border-left-color: #ef4444; background: #1a1025; }
    .info { flex: 1; }
    .titulo { font-size: 15px; font-weight: 500; }
    .meta { font-size: 12px; color: #64748b; margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
    .badge.alta { background: #ef444420; color: #ef4444; }
    .badge.media { background: #f59e0b20; color: #f59e0b; }
    .badge.baja { background: #22c55e20; color: #22c55e; }
    .badge.vencida { background: #ef444420; color: #ef4444; }
    .acciones { display: flex; gap: 6px; }
    .btn { padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-check { background: #22c55e20; color: #22c55e; }
    .btn-edit { background: #f59e0b20; color: #f59e0b; }
    .btn-del { background: #ef444420; color: #ef4444; }
    .vacia { text-align: center; color: #475569; padding: 40px; font-size: 1.1rem; }
  </style>
</head>
<body>
  <h1>📝 Lista de Tareas Pro</h1>

  <!-- Estadísticas -->
  <div class="stats">
    <div class="stat total"><div class="numero" id="stat-total">0</div><div class="label">Total</div></div>
    <div class="stat pendientes"><div class="numero" id="stat-pendientes">0</div><div class="label">Pendientes</div></div>
    <div class="stat completadas"><div class="numero" id="stat-completadas">0</div><div class="label">Completadas</div></div>
    <div class="stat vencidas"><div class="numero" id="stat-vencidas">0</div><div class="label">Vencidas</div></div>
  </div>

  <!-- Formulario -->
  <div class="form-card">
    <div class="form-grid">
      <input type="text" id="inputTarea" placeholder="✏️ Escribe una nueva tarea...">
      <select id="inputCategoria">
        <option value="General">📁 General</option>
        <option value="Trabajo">💼 Trabajo</option>
        <option value="Escuela">📚 Escuela</option>
        <option value="Personal">👤 Personal</option>
        <option value="Salud">❤️ Salud</option>
      </select>
      <select id="inputPrioridad">
        <option value="Media">🟡 Prioridad Media</option>
        <option value="Alta">🔴 Prioridad Alta</option>
        <option value="Baja">🟢 Prioridad Baja</option>
      </select>
      <input type="date" id="inputFecha">
    </div>
    <button class="btn-agregar" onclick="crearTarea()">➕ Agregar Tarea</button>
  </div>

  <!-- Filtros -->
  <div class="filtros">
    <div class="filtro activo" onclick="setFiltro('todas', this)">Todas</div>
    <div class="filtro" onclick="setFiltro('pendientes', this)">Pendientes</div>
    <div class="filtro" onclick="setFiltro('completadas', this)">Completadas</div>
    <div class="filtro" onclick="setFiltro('vencidas', this)">Vencidas</div>
    <div class="filtro" onclick="setFiltro('Alta', this)">🔴 Alta</div>
    <div class="filtro" onclick="setFiltro('Media', this)">🟡 Media</div>
    <div class="filtro" onclick="setFiltro('Baja', this)">🟢 Baja</div>
  </div>

  <!-- Lista -->
  <div class="lista" id="listaTareas"></div>

  <script>
    const API = '/api/tareas';
    let filtroActual = 'todas';
    let todasLasTareas = [];

    async function cargarTareas() {
      const res = await fetch(API);
      todasLasTareas = await res.json();
      actualizarEstadisticas();
      renderTareas();
    }

    function actualizarEstadisticas() {
      const hoy = new Date();
      const total = todasLasTareas.length;
      const completadas = todasLasTareas.filter(t => t.completada).length;
      const pendientes = todasLasTareas.filter(t => !t.completada).length;
      const vencidas = todasLasTareas.filter(t => !t.completada && t.fechaLimite && new Date(t.fechaLimite) < hoy).length;

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-completadas').textContent = completadas;
      document.getElementById('stat-pendientes').textContent = pendientes;
      document.getElementById('stat-vencidas').textContent = vencidas;
    }

    function renderTareas() {
      const hoy = new Date();
      let tareas = todasLasTareas;

      if (filtroActual === 'pendientes') tareas = tareas.filter(t => !t.completada);
      else if (filtroActual === 'completadas') tareas = tareas.filter(t => t.completada);
      else if (filtroActual === 'vencidas') tareas = tareas.filter(t => !t.completada && t.fechaLimite && new Date(t.fechaLimite) < hoy);
      else if (['Alta', 'Media', 'Baja'].includes(filtroActual)) tareas = tareas.filter(t => t.prioridad === filtroActual);

      const lista = document.getElementById('listaTareas');
      if (tareas.length === 0) {
        lista.innerHTML = '<div class="vacia">😴 No hay tareas aquí</div>';
        return;
      }

      lista.innerHTML = '';
      tareas.forEach(t => {
        const vencida = !t.completada && t.fechaLimite && new Date(t.fechaLimite) < hoy;
        const fecha = t.fechaLimite ? new Date(t.fechaLimite).toLocaleDateString('es-MX') : '';
        lista.innerHTML += `
          <div class="tarea ${t.prioridad.toLowerCase()} ${t.completada ? 'completada' : ''} ${vencida ? 'vencida' : ''}">
            <div class="info">
              <div class="titulo">${t.titulo}</div>
              <div class="meta">
                <span>📁 ${t.categoria}</span>
                <span class="badge ${t.prioridad.toLowerCase()}">${t.prioridad}</span>
                ${fecha ? `<span>📅 ${fecha}</span>` : ''}
                ${vencida ? '<span class="badge vencida">⚠️ Vencida</span>' : ''}
              </div>
            </div>
            <div class="acciones">
              <button class="btn btn-check" onclick="toggleTarea('${t._id}', ${!t.completada})">${t.completada ? '↩️' : '✔️'}</button>
              <button class="btn btn-edit" onclick="editarTarea('${t._id}', '${t.titulo}')">✏️</button>
              <button class="btn btn-del" onclick="eliminarTarea('${t._id}')">🗑️</button>
            </div>
          </div>`;
      });
    }

    function setFiltro(filtro, el) {
      filtroActual = filtro;
      document.querySelectorAll('.filtro').forEach(f => f.classList.remove('activo'));
      el.classList.add('activo');
      renderTareas();
    }

    async function crearTarea() {
      const titulo = document.getElementById('inputTarea').value.trim();
      if (!titulo) return alert('Escribe una tarea');
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          titulo,
          categoria: document.getElementById('inputCategoria').value,
          prioridad: document.getElementById('inputPrioridad').value,
          fechaLimite: document.getElementById('inputFecha').value || null
        })
      });
      document.getElementById('inputTarea').value = '';
      document.getElementById('inputFecha').value = '';
      cargarTareas();
    }

    async function toggleTarea(id, completada) {
      await fetch(`${API}/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completada })
      });
      cargarTareas();
    }

    async function editarTarea(id, tituloActual) {
      const nuevo = prompt('Editar tarea:', tituloActual);
      if (!nuevo || nuevo === tituloActual) return;
      await fetch(`${API}/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ titulo: nuevo })
      });
      cargarTareas();
    }

    async function eliminarTarea(id) {
      if (!confirm('¿Eliminar esta tarea?')) return;
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      cargarTareas();
    }

    cargarTareas();
  </script>
</body>
</html>
